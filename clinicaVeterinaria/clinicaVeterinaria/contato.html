         <h1>Cadastro de Pet</h1>
 
  <form action="" method="post">
 
    <h2>Dados do Tutor</h2>
 
    <label for="nome">Nome:</label><br>
    <input type="text" id="nome" name="nome"><br>
 
    <label for="tel">Telefone:</label><br>
    <input type="tel" id="tel" name="telefone"><br>
 
    <label for="email">E-mail:</label><br>
    <input type="email" id="email" name="email"><br>
 
    <h2>Dados do Pet</h2>
 
    <label for="nomepet">Nome do pet:</label><br>
    <input type="text" id="nomepet" name="nome_pet"><br>
 
    <label for="especie">Espécie:</label><br>
    <select id="especie" name="especie">
      <option value="" disabled selected>Selecione...</option>
      <option value="cao">Cão</option>
      <option value="gato">Gato</option>
    </select><br>
 
    <label for="nasc">Data de nascimento:</label><br>
    <input type="date" id="nascimento" name="data_nascimento" required><br>
 
    <label>Sexo:</label><br>
    <input type="radio" id="macho" name="sexo" value="macho" required>
    <label for="macho">Macho</label>
    <input type="radio" id="femea" name="sexo" value="femea">
    <label for="femea">Fêmea</label><br>
 
    <button type="reset">Limpar</button>
    <button type="submit">Cadastrar pet</button>
 
  </form><br>

  <h1>Frete Taxi Dog</h1>
 
  <form action="" method="post">
 
    <label for="cep">CEP:</label><br>
    <input type="text" id="cep" name="cep"><br>
 
    <label for="rua">Nome da rua:</label><br>
    <input type="text" id="rua" name="rua"><br>
 
    <label for="km">Distância aproximada (km):</label><br>
    <input type="number" id="km" name="km"><br>
 
    <label for="valor">Valor do frete (R$):</label><br>
    <input type="text" id="valor" name="valor" placeholder="R$ 0,00" readonly><br><br>
 
    <button type="button" id="btnCalcular">Calcular frete</button>
 
  </form>
